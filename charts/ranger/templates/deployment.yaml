apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ranger.fullname" . }}
  labels:
    {{- include "ranger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ranger.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ranger.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ranger.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: RANGER_DB_TYPE
              value: {{ .Values.db.type | lower }}
            - name: RANGER_DB_HOST
              value: {{ .Values.db.host | default (printf "%s-postgresql" (include "ranger.fullname" .)) | quote }}
            - name: RANGER_DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: RANGER_DB_NAME
              value: {{ .Values.db.name | quote }}
            - name: RANGER_DB_USER
              value: {{ .Values.db.user | quote }}
            - name: RANGER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ranger.fullname" . }}-passwords
                  key: db-password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ranger.fullname" . }}-passwords
                  key: db-root-password
            - name: RANGER_DB_ROOT_USER
              value: {{ .Values.db.rootUser | quote }}
            - name: RANGER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ranger.fullname" . }}-passwords
                  key: admin-password
            - name: RANGER_KEYADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ranger.fullname" . }}-passwords
                  key: keyadmin-password
            - name: RANGER_TAGSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ranger.fullname" . }}-passwords
                  key: tagsync-password
            - name: RANGER_USERSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ranger.fullname" . }}-passwords
                  key: usersync-password
            - name: RANGER_AUDIT_STORE
              value: {{ .Values.admin.auditStore | default "solr" | quote }}
            - name: RANGER_AUDIT_HDFS_DEST_DIR
              value: {{ .Values.admin.auditHdfsDestDir | default "" | quote }}
            - name: RANGER_EXTERNAL_URL
              value: {{ .Values.admin.externalUrl | quote }}
            - name: SETUP_RANGER
              value: "true"
            - name: DEBUG_ADMIN
              value: "false"
            - name: JAVA_HOME
              value: /opt/java/openjdk
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /login.jsp
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /login.jsp
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes: []
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
