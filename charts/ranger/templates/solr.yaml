{{- if .Values.solr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ranger.fullname" . }}-solr
  labels:
    {{- include "ranger.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ranger.name" . }}-solr
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ranger.name" . }}-solr
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: solr
          image: "{{ .Values.solr.image.repository }}:{{ .Values.solr.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.solr.service.port }}
              name: solr
          command:
            - solr-precreate
            - {{ .Values.solr.collection }}
          # Minimal resources for local testing
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ranger.fullname" . }}-solr
  labels:
    {{- include "ranger.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.solr.service.port }}
      targetPort: solr
      protocol: TCP
      name: solr
  selector:
    app.kubernetes.io/name: {{ include "ranger.name" . }}-solr
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
