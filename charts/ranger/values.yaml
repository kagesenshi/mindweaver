# Default values for ranger.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/kagesenshi/mindweaver/ranger
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "2.8.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 6080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: ranger.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Ranger Admin Configuration
admin:
  # Admin Password
  password: "rangerR0cks!"
  keyadminPassword: "rangerR0cks!"
  tagsyncPassword: "rangerR0cks!"
  usersyncPassword: "rangerR0cks!"

  # Ranger External URL
  externalUrl: "http://ranger-admin:6080"

# Database Configuration
db:
  type: postgres
  host: "" # Use bundled if empty and enabled
  port: 5432
  name: ranger
  user: rangeradmin
  password: "rangerR0cks!"
  rootUser: postgres
  rootPassword: "rangerR0cks!"

# Postgres Bundled Service
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "13"
  service:
    port: 5432

# Solr (for Audits) Configuration
solr:
  enabled: true
  image:
    repository: solr
    tag: "8.11"
  service:
    port: 8983
  collection: "ranger_audits"

# ZooKeeper Configuration
zookeeper:
  enabled: true
  image:
    repository: zookeeper
    tag: "3.7"
  service:
    port: 2181

# Kerberos Configuration
kerberos:
  enabled: false
  realm: "EXAMPLE.COM"
  kdcHost: "ranger-kdc"
